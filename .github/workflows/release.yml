name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Step 1: Create the draft release once, both build jobs upload to it ─────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const isPrerelease = tag.includes('alpha') || tag.includes('beta');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Kiyoshi Music ${tag}`,
              draft: true,
              prerelease: isPrerelease,
              body: ''
            });
            core.setOutput('release_id', data.id.toString());

  # ─── Step 2a: Windows NSIS installer ─────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create build directories
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          New-Item -ItemType Directory -Force src-tauri/resources | Out-Null

      - name: Install Python dependencies
        working-directory: python-backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build Python server (Windows)
        working-directory: python-backend
        run: |
          pyinstaller kiyoshi-server-x86_64-pc-windows-msvc.spec `
            --distpath ../src-tauri/binaries `
            --workpath build_tmp/kiyoshi-server-x86_64-pc-windows-msvc

      - name: Download node.exe
        run: |
          Invoke-WebRequest `
            -Uri "https://nodejs.org/dist/v20.11.0/win-x64/node.exe" `
            -OutFile "src-tauri/resources/node.exe"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri NSIS installer + updater bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc --bundles nsis

  # ─── Step 2b: Linux AppImage + .deb ──────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            squashfs-tools \
            file \
            libssl-dev

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries

      - name: Install Python dependencies
        working-directory: python-backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build Python server (Linux)
        working-directory: python-backend
        run: |
          pyinstaller kiyoshi-server-x86_64-unknown-linux-gnu.spec \
            --distpath ../src-tauri/binaries \
            --workpath build_tmp/kiyoshi-server-x86_64-unknown-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Make server binary executable
        run: chmod +x src-tauri/binaries/kiyoshi-server-x86_64-unknown-linux-gnu

      - name: Build Tauri AppImage + deb
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: "1"
          # Tell linuxdeploy NOT to bundle Mesa / GL / DRM / Wayland / X11 libs.
          # The bundled versions can be incompatible with the host (notably Steam
          # Deck on KDE Wayland) causing eglGetDisplay to fail with
          # EGL_BAD_PARAMETER. Forcing the host's libraries to be used fixes this
          # because the host's Mesa is matched to its kernel/GPU driver.
          LINUXDEPLOY_EXCLUDE_LIST: "libGL.so.1 libGLX.so.0 libEGL.so.1 libGLdispatch.so.0 libGLESv2.so.2 libGLESv1_CM.so.1 libgbm.so.1 libdrm.so.2 libdrm_amdgpu.so.1 libdrm_intel.so.1 libdrm_nouveau.so.2 libdrm_radeon.so.1 libwayland-client.so.0 libwayland-cursor.so.0 libwayland-egl.so.1 libwayland-server.so.0 libxkbcommon.so.0 libX11.so.6 libxcb.so.1 libXext.so.6 libXrender.so.1 libXfixes.so.3"
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-unknown-linux-gnu --bundles appimage --bundles deb

      - name: List AppImage contents (debug — helps diagnose missing sidecars)
        run: |
          for img in src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage; do
            echo "=== Contents of $(basename "$img") ==="
            "$img" --appimage-extract > /dev/null 2>&1 || true
            echo "-- usr/bin --"
            ls -la squashfs-root/usr/bin/ 2>/dev/null || echo "(no usr/bin)"
            echo "-- usr/lib (top level) --"
            ls -la squashfs-root/usr/lib/ 2>/dev/null | head -40 || echo "(no usr/lib)"
            echo "-- looking for kiyoshi-server anywhere --"
            find squashfs-root -name "kiyoshi-server*" 2>/dev/null || echo "(none found)"
            rm -rf squashfs-root
          done

  # ─── Step 3: Publish release + generate latest.json ─────────────────────────
  # Runs AFTER both builds so all assets are uploaded.
  # Publishing the draft first makes browser_download_url available in the API.
  finalize:
    needs: [create-release, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Publish release and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASE_ID="${{ needs.create-release.outputs.release_id }}"

          # Extract changelog for this version and publish the draft
          RELEASE_NOTES=""
          if [ -f CHANGELOG.md ]; then
            RELEASE_NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -80)
          fi

          gh api "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            --method PATCH \
            --field draft=false \
            --field body="${RELEASE_NOTES}"

          # Poll for assets — tauri-action@v0 uploads .exe + .exe.sig (Tauri 2.x format)
          EXE_URL=""
          SIG_URL=""
          for attempt in 1 2 3 4 5 6; do
            echo "Fetching assets (attempt $attempt/6)..."
            ASSETS=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets")
            EXE_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("x64-setup.exe")) | .browser_download_url' | head -1)
            SIG_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("x64-setup.exe.sig")) | .browser_download_url' | head -1)

            if [ -n "$EXE_URL" ] && [ "$EXE_URL" != "null" ]; then
              echo "Assets ready on attempt $attempt."
              break
            fi

            echo "Assets not ready yet — waiting 15s..."
            sleep 15
          done

          echo "EXE URL: $EXE_URL"
          echo "SIG URL: $SIG_URL"

          if [ -z "$EXE_URL" ] || [ "$EXE_URL" = "null" ]; then
            echo "ERROR: .exe asset not found after all retries. Updater will not work." >&2
            exit 1
          fi

          SIG_CONTENT=""
          if [ -n "$SIG_URL" ] && [ "$SIG_URL" != "null" ]; then
            for sig_attempt in 1 2 3 4 5; do
              SIG_CONTENT=$(curl -fsSL "$SIG_URL" 2>/dev/null) && break
              echo "SIG download failed (attempt $sig_attempt/5) — waiting 10s..."
              sleep 10
            done
          fi

          # Extract the changelog section for this version from CHANGELOG.md
          # Matches everything between "## [X.Y.Z...]" and the next "## [" heading
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -80)
          fi

          # Use jq to build JSON safely (handles newlines in sig content)
          jq -n \
            --arg version "v${VERSION}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg url "${EXE_URL}" \
            --arg sig "${SIG_CONTENT}" \
            --arg notes "${NOTES}" \
            '{version: $version, pub_date: $pub_date, notes: $notes, platforms: {"windows-x86_64": {url: $url, signature: $sig}}}' \
            > updates/latest.json

          # Commit to repo so the raw.githubusercontent.com endpoint always works
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add updates/latest.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update latest.json for $TAG [skip ci]"
          git push origin master
