name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python backend ────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: python-backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build Python backend
        working-directory: python-backend
        run: >
          pyinstaller
          kiyoshi-server-${{ matrix.target }}.spec
          --distpath ../src-tauri/binaries
          --workpath build_tmp/kiyoshi-server-${{ matrix.target }}

      # ── Node / frontend ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm install

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system dependencies for WebKitGTK ───────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Tauri build + GitHub Release ──────────────────────────────────────
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kiyoshi Music ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

      # ── Linux tarball (Arch / SteamOS) ────────────────────────────────────
      - name: Package Linux tarball for Arch/SteamOS
        if: runner.os == 'Linux'
        run: |
          TAG="${{ github.ref_name }}"
          OUT="kiyoshi-music-${TAG}-linux-x86_64"
          mkdir -p "$OUT"

          cp src-tauri/target/release/kiyoshi-music "$OUT/"
          cp src-tauri/binaries/kiyoshi-server-x86_64-unknown-linux-gnu "$OUT/kiyoshi-server"

          # Launcher-Script mit SteamOS-kompatiblen Env-Vars
          cat > "$OUT/kiyoshi-music.sh" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export GDK_BACKEND=x11
          exec "$DIR/kiyoshi-music" "$@"
          SCRIPT
          chmod +x "$OUT/kiyoshi-music.sh"

          # Install-Script für Arch/SteamOS
          cat > "$OUT/install.sh" << 'SCRIPT'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          if command -v pacman &>/dev/null; then
            echo "Arch/SteamOS erkannt – installiere Abhängigkeiten..."
            sudo pacman -S --needed --noconfirm webkit2gtk-4.1 libayatana-appindicator ffmpeg
          elif command -v apt-get &>/dev/null; then
            echo "Debian/Ubuntu erkannt – installiere Abhängigkeiten..."
            sudo apt-get install -y libwebkit2gtk-4.1-0 libayatana-appindicator3-1 ffmpeg
          else
            echo "Unbekannte Distribution – bitte webkit2gtk-4.1 und ffmpeg manuell installieren."
          fi

          sudo install -Dm755 "$SCRIPT_DIR/kiyoshi-music" /usr/local/bin/kiyoshi-music
          sudo install -Dm755 "$SCRIPT_DIR/kiyoshi-server" /usr/local/lib/kiyoshi-music/kiyoshi-server
          sudo install -Dm755 "$SCRIPT_DIR/kiyoshi-music.sh" /usr/local/bin/kiyoshi-music-launcher

          echo "Fertig! Starte mit: kiyoshi-music-launcher"
          SCRIPT
          chmod +x "$OUT/install.sh"

          tar -czf "${OUT}.tar.gz" "$OUT/"

      - name: Upload Linux tarball to release
        if: runner.os == 'Linux'
        run: |
          gh release upload "${{ github.ref_name }}" \
            kiyoshi-music-${{ github.ref_name }}-linux-x86_64.tar.gz \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
