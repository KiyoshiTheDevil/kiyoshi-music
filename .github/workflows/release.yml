name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Step 1: Create the draft release once, both build jobs upload to it ─────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const isPrerelease = tag.includes('alpha') || tag.includes('beta');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Kiyoshi Music ${tag}`,
              draft: true,
              prerelease: isPrerelease,
              body: ''
            });
            core.setOutput('release_id', data.id.toString());

  # ─── Step 2a: Windows NSIS installer ─────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create build directories
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          New-Item -ItemType Directory -Force src-tauri/resources | Out-Null

      - name: Install Python dependencies
        working-directory: python-backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build Python server (Windows)
        working-directory: python-backend
        run: |
          pyinstaller kiyoshi-server-x86_64-pc-windows-msvc.spec `
            --distpath ../src-tauri/binaries `
            --workpath build_tmp/kiyoshi-server-x86_64-pc-windows-msvc

      - name: Download node.exe
        run: |
          Invoke-WebRequest `
            -Uri "https://nodejs.org/dist/v20.11.0/win-x64/node.exe" `
            -OutFile "src-tauri/resources/node.exe"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc --bundles nsis

  # ─── Step 2b: Linux AppImage + .deb ──────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            squashfs-tools \
            file \
            libssl-dev

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries

      - name: Install Python dependencies
        working-directory: python-backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build Python server (Linux)
        working-directory: python-backend
        run: |
          pyinstaller kiyoshi-server-x86_64-unknown-linux-gnu.spec \
            --distpath ../src-tauri/binaries \
            --workpath build_tmp/kiyoshi-server-x86_64-unknown-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Make server binary executable
        run: chmod +x src-tauri/binaries/kiyoshi-server-x86_64-unknown-linux-gnu

      - name: Build Tauri AppImage + deb
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-unknown-linux-gnu --bundles appimage --bundles deb
