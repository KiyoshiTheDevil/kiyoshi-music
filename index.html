<!DOCTYPE html>
<html lang="de" style="background:#0d0d0d;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' ipc: http://ipc.localhost http://localhost:9847 http://127.0.0.1:9847 http://127.0.0.1:8888 https://translate.googleapis.com https://api.github.com; img-src 'self' data: https: http: blob:; media-src 'self' file: blob: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src http://localhost:*" />
    <title>Kiyoshi Music</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0d0d0d; color: #fff; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #root { min-height: 100vh; }
      #boot-splash { position: fixed; inset: 0; background: #0d0d0d; display: flex; align-items: center; justify-content: center; z-index: 9999; pointer-events: none; }
      #boot-splash .pulse { width: 56px; height: 56px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #e040fb, #6b1c8a); box-shadow: 0 0 32px rgba(224,64,251,0.45); animation: bp 1.4s ease-in-out infinite; }
      @keyframes bp { 0%,100% { transform: scale(0.92); opacity: 0.7; } 50% { transform: scale(1.06); opacity: 1; } }
      .loaded #boot-splash { opacity: 0; transition: opacity 0.35s ease; }
    </style>

    <!-- Local FontAwesome — non-blocking via media trick -->
    <link rel="stylesheet" href="/css/all.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="/css/all.min.css" /></noscript>

    <!-- Google Fonts — non-blocking, never block first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" media="print" onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;700&family=Roboto:wght@400;700&family=Nunito:wght@400;700&family=Exo+2:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Montserrat:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,700&family=Ubuntu:wght@400;700&family=Lexend:wght@400;700&family=Space+Grotesk:wght@400;700&family=Sora:wght@400;700&family=Barlow:wght@400;700&family=Figtree:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&family=Kanit:wght@400;700&family=Oxanium:wght@400;700&family=Chakra+Petch:wght@400;700&display=swap" />
  </head>
  <body>
    <!-- HTML-level boot splash. Stays visible until React mounts and fades it out. -->
    <div id="boot-splash"><div class="pulse"></div></div>
    <div id="root"></div>
    <script>
      // Diagnostic: log boot timing to console (visible if AppImage is launched from terminal)
      window.__bootStart = Date.now();
      console.log("[boot] HTML parsed at " + new Date().toISOString());
      window.addEventListener("error", e => console.error("[boot] global error:", e.message, e.filename, e.lineno));
      window.addEventListener("unhandledrejection", e => console.error("[boot] unhandled promise:", e.reason));
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
